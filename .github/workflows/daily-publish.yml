name: Daily Blog Publish

on:
  schedule:
    - cron: '0 15 * * *'  # 8 AM PDT / 3 PM UTC
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run publisher
        run: python .github/scripts/cloud_publish.py

      - name: Commit and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to publish" && exit 0
          git commit -m "$(cat .github/scripts/commit-msg.txt 2>/dev/null || echo 'Publish scheduled blog post')"
          git push origin HEAD:main
